<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Catavision+ · GMAO Catana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f5; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 12px 35px rgba(0,0,0,0.12); overflow: hidden; }
        .header { background: #0b1a2c; color: white; padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo-catana { display: flex; align-items: baseline; gap: 12px; }
        .catana-main { font-size: 2rem; font-weight: 800; letter-spacing: 2px; color: #e03a3e; }
        .catana-sub { font-size: 0.7rem; font-weight: 500; background: #e03a3e; padding: 4px 10px; border-radius: 40px; }
        .software-title .main { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.3px; color: #f0f0f0; }
        .tabs { display: flex; gap: 6px; background: white; border-bottom: 2px solid #e0e7ed; padding: 0 24px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 14px 22px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; color: #2c3e44; border-radius: 30px 30px 0 0; }
        .tab-btn.active { border-bottom: 3px solid #e03a3e; color: #e03a3e; background: #fff5f5; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 14px rgba(0,0,0,0.03); margin-bottom: 28px; border: 1px solid #eef2f8; overflow-x: auto; }
        .card-header { padding: 18px 24px; border-bottom: 2px solid #e03a3e; font-weight: 700; font-size: 1.2rem; background: #fefaf9; }
        .card-body { padding: 22px 24px; }
        button { background: #e03a3e; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; margin: 3px; font-size: 0.8rem; }
        button:hover { background: #b02a2e; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-left: 5px solid #e03a3e; padding: 18px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stat-card .number { font-size: 2rem; font-weight: 800; color: #1f3a4b; }
        .empty-state { color: #6c86a3; padding: 2rem; text-align: center; font-style: italic; }
        .footer { background: #0b1a2c; color: #aac7dc; text-align: center; padding: 18px; font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-catana"><div class="catana-main">CATANA</div><div class="catana-sub">CATAMARANS</div></div>
        <div class="software-title"><div class="main">⚓ Catavision+ GMAO</div></div>
    </div>
    <div class="tabs" id="tabsContainer"></div>
    <div id="mainContent"></div>
    <div class="footer">GMAO intégrale – Version simplifiée (sans Firebase)</div>
</div>

<script>
    // Données simulées (stockage local)
    let equipements = [
        { id: 1, nom: "Biesse 1", ref: "B1", localisation: "Atelier", miseService: "2020-01-01", statut: "En fonctionnement" },
        { id: 2, nom: "Biesse 2", ref: "B2", localisation: "Atelier", miseService: "2020-01-01", statut: "Maintenance" },
        { id: 3, nom: "Jade 240", ref: "J240", localisation: "Usinage", miseService: "2021-06-01", statut: "En fonctionnement" }
    ];
    let pannes = [
        { id: 1, equipementId: 2, description: "Bruit anormal", dateDecla: new Date().toISOString(), statut: "Ouvert" }
    ];

    function getEquipementName(id) {
        const eq = equipements.find(e => e.id === id);
        return eq ? eq.nom : "?";
    }

    function renderDashboard() {
        const fonctionnel = equipements.filter(e => e.statut === "En fonctionnement").length;
        const maint = equipements.filter(e => e.statut === "Maintenance").length;
        const panne = equipements.filter(e => e.statut === "Panne").length;
        const pannesActives = pannes.filter(p => p.statut !== "Résolu");
        let pannesHtml = pannesActives.length === 0 ? "<p>Aucune panne en cours.</p>" : 
            `<table style="width:100%"><thead><th>Machine</th><th>Description</th><th>Date</th><th>Action</th></thead><tbody>
                ${pannesActives.map(pan => `
                    <tr><td>${getEquipementName(pan.equipementId)}</td><td>${pan.description}</td><td>${new Date(pan.dateDecla).toLocaleString()}</td>
                    <td><button class="btn-sm" onclick="resoudrePanne(${pan.id})">Résoudre</button></td></tr>
                `).join('')}
            </tbody></table>`;
        document.getElementById("mainContent").innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>🟢 Fonctionnelles</h3><div class="number">${fonctionnel}</div></div>
                <div class="stat-card"><h3>🔧 Maintenance</h3><div class="number">${maint}</div></div>
                <div class="stat-card"><h3>🔴 Pannes</h3><div class="number">${panne}</div></div>
            </div>
            <div class="card"><div class="card-header">🔧 Pannes actives</div><div class="card-body">${pannesHtml}</div></div>
        `;
    }

    function renderEquipements() {
        document.getElementById("mainContent").innerHTML = `
            <div class="card"><div class="card-header">🖥️ Liste des équipements</div><div class="card-body">
                <table style="width:100%"><thead><th>Nom</th><th>Référence</th><th>Localisation</th><th>Statut</th><th>Actions</th></thead>
                <tbody>${equipements.map(e => `
                    <tr><td>${e.nom}</td><td>${e.ref}</td><td>${e.localisation}</td>
                    <td><span style="background:${e.statut === 'En fonctionnement' ? '#2c7a4d' : (e.statut === 'Maintenance' ? '#f4b942' : '#e03a3e')}; color:white; padding:4px 8px; border-radius:20px;">${e.statut}</span></td>
                    <td><button class="btn-sm" onclick="changerStatut(${e.id}, 'En fonctionnement')">✅ Fonctionnelle</button>
                    <button class="btn-sm" onclick="changerStatut(${e.id}, 'Maintenance')">🔧 Maintenance</button>
                    <button class="btn-sm" onclick="changerStatut(${e.id}, 'Panne')">❌ Panne</button></td></tr>
                `).join('')}</tbody>
                </table>
                <button id="ajouterEquipement" style="margin-top:16px;">+ Ajouter un équipement</button>
            </div></div>
        `;
        document.getElementById("ajouterEquipement")?.addEventListener("click", () => {
            const nom = prompt("Nom de l'équipement :");
            if (nom) {
                const newId = Math.max(...equipements.map(e => e.id)) + 1;
                equipements.push({ id: newId, nom, ref: nom.substring(0,3).toUpperCase(), localisation: "Atelier", miseService: new Date().toISOString().slice(0,10), statut: "En fonctionnement" });
                renderEquipements();
            }
        });
    }

    window.changerStatut = (id, statut) => {
        const index = equipements.findIndex(e => e.id === id);
        if (index !== -1) {
            equipements[index].statut = statut;
            renderEquipements();
            renderDashboard(); // Met à jour le dashboard si actif
        }
    };

    window.resoudrePanne = (id) => {
        const index = pannes.findIndex(p => p.id === id);
        if (index !== -1) {
            pannes[index].statut = "Résolu";
            renderDashboard();
        }
    };

    function initTabs() {
        const tabs = ["dashboard", "equipements"];
        const titles = { dashboard: "📊 Dashboard", equipements: "🖥️ Équipements" };
        const container = document.getElementById("tabsContainer");
        container.innerHTML = "";
        let activeTab = "dashboard";
        tabs.forEach(tab => {
            const btn = document.createElement("button");
            btn.className = "tab-btn" + (tab === activeTab ? " active" : "");
            btn.textContent = titles[tab];
            btn.onclick = () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                if (tab === "dashboard") renderDashboard();
                else if (tab === "equipements") renderEquipements();
            };
            container.appendChild(btn);
        });
        renderDashboard();
    }

    initTabs();
</script>
</body>
</html>
