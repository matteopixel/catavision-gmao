<!DOCTYPE html>
<html lang="fr">

    <meta charset="UTF-8">

        .catana-main { font-size: 2rem; font-weight: 800; letter-spacing: 2px; color: #e03a3e; }

        .software-title .main { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.3px; color: #f0f0f0; }
        .tabs { display: flex; gap: 6px; background: white; border-bottom: 2px solid #e0e7ed; padding: 0 24px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 14px 22px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; color: #2c3e44; border-radius: 30px 30px 0 0; }
        .tab-btn.active { border-bottom: 3px solid #e03a3e; color: #e03a3e; background: #fff5f5; }

        .card-header { padding: 18px 24px; border-bottom: 2px solid #e03a3e; font-weight: 700; font-size: 1.2rem; background: #fefaf9; }
        .card-body { padding: 22px 24px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e9edf2; vertical-align: top; }
        th { background: #f8fafc; font-weight: 600; }
        button { background: #e03a3e; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 500; transition: 0.2s; margin: 3px; font-size: 0.8rem; }
        button:hover { background: #b02a2e; transform: translateY(-1px); }
        .btn-secondary { background: #2c5a6e; }
        .btn-sm { padding: 5px 12px; font-size: 0.7rem; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
        .badge-red { background: #e03a3e; color: white; }
        .badge-green { background: #2c7a4d; color: white; }
        .badge-warning { background: #f4b942; color: #2d2b1f; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-left: 5px solid #e03a3e; padding: 18px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .stat-card .number { font-size: 2rem; font-weight: 800; color: #1f3a4b; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }

        input, select, textarea { width: 100%; padding: 10px 14px; margin: 8px 0 18px; border: 1px solid #cfdfe8; border-radius: 24px; font-family: inherit; }
        label { font-weight: 600; margin-top: 8px; display: block; }
        .alerte-rouge { animation: pulse 1s infinite; background-color: #e03a3e; color: white; padding: 14px; text-align: center; font-weight: bold; border-radius: 40px; margin-bottom: 20px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .footer { background: #0b1a2c; color: #aac7dc; text-align: center; padding: 18px; font-size: 0.75rem; }
        .reset-btn { background: #475569; margin: 0 6px 8px 0; }
        .machine-gamme { background: #f9fafb; margin: 12px 0; padding: 12px 16px; border-radius: 24px; border-left: 4px solid #e03a3e; }

        .qcm-options { display: flex; gap: 24px; margin: 12px 0; }
        .gantt-wrapper { overflow-x: auto; margin-top: 1rem; }
        .gantt-table { border-collapse: collapse; white-space: nowrap; font-size: 11px; min-width: 100%; }
        .gantt-table th, .gantt-table td { border: 0.5px solid #d4dee8; text-align: center; vertical-align: middle; padding: 6px 4px; }
        .machine-col { position: sticky; left: 0; background: #f8fafd; font-weight: 700; color: #0f3b4f; z-index: 10; text-align: left; padding: 0 12px; min-width: 100px; }
        .month-header { background: #2F4F7F; color: white; font-weight: 600; font-size: 12px; padding: 8px 4px; }
        .day-num { font-weight: 600; background: #eef3fc; font-size: 10px; width: 24px; }
        .cell { width: 24px; height: 24px; cursor: pointer; }
        .wk { background: #d9d9d9; }
        .hol { background: #ffb3b3; }
        .sch { background: #4472c4; }
        .maint { background: #ff6b35; }
        .check { background: #9b59b6; }
        .margin { background: #90ee90; }
        .unavail { background: #ff0000; }
        .wd { background: #ffffff; }
        .lbl { font-size: 11px; font-weight: 800; color: white; display: inline-block; }
        .legend { display: flex; flex-wrap: wrap; gap: 16px; background: white; padding: 12px 20px; border-radius: 28px; margin-top: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .leg-item { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; }

</head>

<div class="container" id="appContainer">

        <div class="software-title"><div class="main">⚓ Catavision+ GMAO</div></div>
    </div>
    <div id="tabContents"></div>
    <div class="footer">GMAO intégrale – Stockage local (localStorage)</div>
</div>

<!-- MODAL INTERVENTION -->
<div id="interventionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Détails de l'intervention</h3><button class="close-modal" onclick="closeInterventionModal()">&times;</button></div>
        <div id="modalInterventionBody">
            <label>Machine :</label><span id="modalMachine"></span>
            <label>Date :</label><span id="modalDate"></span>
            <label>Type :</label><span id="modalType"></span>
            <label>Matériel nécessaire :</label><input type="text" id="modalMateriel" placeholder="ex: roulements, graisse">
            <label>Temps d'intervention :</label><input type="text" id="modalTemps" placeholder="ex: 2h30">
            <label>Gamme de maintenance :</label><div id="modalGamme" class="gamme-preview"></div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
            <button class="btn-secondary" onclick="closeInterventionModal()">Annuler</button>
            <button id="modalSaveInterventionBtn">Enregistrer</button>
        </div>
    </div>
</div>

<!-- MODALE GLOBALE -->
<div id="globalModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3 id="modalTitle">Titre</h3><button class="close-modal" onclick="closeModal()">&times;</button></div>
        <div id="modalBody"></div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
            <button class="btn-secondary" onclick="closeModal()">Annuler</button>
            <button id="modalSaveBtn">Enregistrer</button>
        </div>
    </div>
</div>

    // Initialisation des données par défaut
    function initEquipements() { if (getData(STORAGE.equipements).length === 0) { const equipments = MACHINES_LIST.map((nom, idx) => ({ id: idx+1, nom, ref: nom.replace(/\s/g,'').toUpperCase(), localisation: "Atelier Principal", miseService: "2020-01-01", statut: "En fonctionnement" })); setData(STORAGE.equipements, equipments); } }
    function initOtherData() {
        if (!localStorage.getItem(STORAGE.pieces)) setData(STORAGE.pieces, [{ id:1, nom:"Courroie trapézoïdale", ref:"CT-100", stock:12, seuil:5, fournisseurPref:"Catana" }]);

    function getEquipementIdByName(nom) { const eq = getData(STORAGE.equipements).find(e=>e.nom===nom); return eq?eq.id:null; }
    function getRealisePercent() { 
        const preventifs = getData(STORAGE.preventifs); const pannes = getData(STORAGE.pannes); 
        const total = preventifs.length + pannes.length; const realisees = preventifs.filter(p=>p.statut==="Réalisé").length + pannes.filter(p=>p.statut==="Résolu").length; 
        return { realisees, total, percent: total === 0 ? 100 : Math.round((realisees / total) * 100) };

        dateAlerteCommande.setDate(debut.getDate() + dureeJours);

        dateAlerteInstall.setDate(dateAlerteCommande.getDate() + 14);
        const consommable = {
            id: Date.now(),
            machine,
            nomPiece,
            reference,
            dureeJours,
            dateDebut: debut.toISOString(),
            dateAlerteCommande: dateAlerteCommande.toISOString(),
            dateAlerteInstall: dateAlerteInstall.toISOString(),
            alerteCommandeEnvoyee: false,
            alerteInstallEnvoyee: false
        };
        const list = getConsommables();
        list.push(consommable);
        saveConsommables(list);
    }
    function supprimerConsommable(id) {
        let list = getConsommables();
        list = list.filter(c => c.id !== id);
        saveConsommables(list);
    }
    function getAlertesActives() {
        const now = new Date();
        const consos = getConsommables();
        const alertesCommande = [];
        const alertesInstall = [];
        consos.forEach(c => {
            const dateCmd = new Date(c.dateAlerteCommande);
            const dateInst = new Date(c.dateAlerteInstall);
            if (dateCmd <= now && !c.alerteCommandeEnvoyee) alertesCommande.push(c);
            if (dateInst <= now && !c.alerteInstallEnvoyee) alertesInstall.push(c);
        });
        return { alertesCommande, alertesInstall };
    }
    function marquerAlerteEnvoyee(id, type) {
        let list = getConsommables();
        const idx = list.findIndex(c => c.id === id);
        if (idx !== -1) {
            if (type === 'commande') list[idx].alerteCommandeEnvoyee = true;
            else if (type === 'install') list[idx].alerteInstallEnvoyee = true;
            saveConsommables(list);
        }
    }

    function getFixedInterventionId(machine, date, type) { return `fixed_${machine}_${date}_${type}`; }
    function getAllActiveInterventions() {
        const excluded = getExcludedIds(); const active = [];
        for (let machine of GANTT_DATA.machines) {
            const mData = GANTT_DATA.data[machine];
            (mData.maint || []).forEach(date => { const id = getFixedInterventionId(machine, date, 'M'); if (!excluded.includes(id)) active.push({ id, machine, date, type: 'M', source: 'fixe' }); });
            (mData.check || []).forEach(date => { const id = getFixedInterventionId(machine, date, 'V'); if (!excluded.includes(id)) active.push({ id, machine, date, type: 'V', source: 'fixe' }); });
        }
        const perso = getData(STORAGE.interventionsPerso);
        perso.forEach(inter => { const id = `perso_${inter.id}`; if (!excluded.includes(id)) active.push({ id, machine: inter.machine, date: inter.date, type: inter.type, source: 'perso', originalId: inter.id }); });
        return active;

    function openEquipementModal(equipement = null) {
        const isEdit = !!equipement;
        const title = isEdit ? "✏️ Modifier l'équipement" : "➕ Ajouter un équipement";
        const bodyHtml = `<label>Nom :</label><input id="eqNom" value="${escapeHtml(equipement?.nom||'')}"><label>Référence :</label><input id="eqRef" value="${escapeHtml(equipement?.ref||'')}"><label>Localisation :</label><input id="eqLocalisation" value="${escapeHtml(equipement?.localisation||'Atelier Principal')}"><label>Date de mise en service :</label><input id="eqMiseService" type="date" value="${equipement?.miseService||new Date().toISOString().slice(0,10)}"><label>Statut :</label><select id="eqStatut"><option value="En fonctionnement">En fonctionnement</option><option value="Maintenance">Maintenance</option><option value="Panne">Panne</option></select>`;
        showModal(title, bodyHtml, () => {
            const nom = document.getElementById("eqNom").value.trim();
            const ref = document.getElementById("eqRef").value.trim();
            const localisation = document.getElementById("eqLocalisation").value.trim();
            const miseService = document.getElementById("eqMiseService").value;
            const statut = document.getElementById("eqStatut").value;
            if (!nom) return alert("Le nom est obligatoire.");
            let equipements = getData(STORAGE.equipements);
            if (isEdit) {
                equipement.nom = nom; equipement.ref = ref; equipement.localisation = localisation; equipement.miseService = miseService; equipement.statut = statut;
                setData(STORAGE.equipements, equipements);
            } else {
                if (equipements.some(e => e.nom === nom)) { alert("Un équipement avec ce nom existe déjà."); return; }
                const newId = equipements.length ? Math.max(...equipements.map(e => e.id)) + 1 : 1;
                equipements.push({ id: newId, nom, ref: ref || nom.replace(/\s/g, '').toUpperCase(), localisation: localisation || "Atelier Principal", miseService: miseService || new Date().toISOString().slice(0,10), statut });
                setData(STORAGE.equipements, equipements);
            }
            if (currentMaintTab === 'equipements') renderEquipements();
            else refreshMaintenanceViews();
        });
    }
    
    function buildGanttTableWithCustom() {
        const container = document.getElementById("ganttContainer"); if(!container) return;
        container.innerHTML = '';
        const table = document.createElement('table'); table.className = 'gantt-table';
        const rowMonth = table.insertRow();
        const thFirst = document.createElement('th'); thFirst.className = 'machine-col month-header'; thFirst.textContent = 'Machine'; rowMonth.appendChild(thFirst);
        let prevMonth = null, colSpan = 0, currentMonthTh = null;
        GANTT_DATA.all_days.forEach((d, idx) => {
            const m = parseInt(d.split('-')[1]);
            if (m !== prevMonth) {
                if (currentMonthTh) currentMonthTh.colSpan = colSpan;
                currentMonthTh = document.createElement('th'); currentMonthTh.className = 'month-header';
                const monthNames = {4:'Avril 2026',5:'Mai 2026',6:'Juin 2026',7:'Juillet 2026'};
                currentMonthTh.textContent = monthNames[m];
                rowMonth.appendChild(currentMonthTh);
                colSpan = 1; prevMonth = m;
            } else colSpan++;
            if (idx === GANTT_DATA.all_days.length-1 && currentMonthTh) currentMonthTh.colSpan = colSpan;
        });
        const rowDayNum = table.insertRow();
        const thBlank = document.createElement('th'); thBlank.className = 'machine-col'; thBlank.textContent = ''; rowDayNum.appendChild(thBlank);
        GANTT_DATA.all_days.forEach(d => {
            const th = document.createElement('th'); th.className = 'day-num'; th.textContent = parseInt(d.split('-')[2]);
            const dayOfWeek = new Date(d).getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) th.classList.add('wk');
            else if (GANTT_DATA.holidays.includes(d)) th.classList.add('hol');
            else if (GANTT_DATA.school_days.includes(d)) th.classList.add('sch');
            else th.style.background = '#DCE6F1';
            rowDayNum.appendChild(th);
        });
        const activeInterventions = getAllActiveInterventions();
        GANTT_DATA.machines.forEach(machine => {
            const mgSet = new Set(GANTT_DATA.data[machine].margin);
            const isEastman = machine.startsWith('Eastman');
            const row = table.insertRow();
            const tdName = document.createElement('td'); tdName.className = 'machine-col'; tdName.textContent = machine; row.appendChild(tdName);
            GANTT_DATA.all_days.forEach(d => {
                const td = document.createElement('td'); td.className = 'cell';
                const month = parseInt(d.split('-')[1]);
                const interv = activeInterventions.find(i => i.machine === machine && i.date === d);
                if (new Date(d).getDay() === 0 || new Date(d).getDay() === 6) td.classList.add('wk');
                else if (GANTT_DATA.holidays.includes(d)) td.classList.add('hol');
                else if (GANTT_DATA.school_days.includes(d)) td.classList.add('sch');
                else if (isEastman && month === 6) td.classList.add('unavail');
                else if (interv && interv.type === 'M') { td.classList.add('maint'); td.innerHTML = '<span class="lbl">M</span>'; }
                else if (interv && interv.type === 'V') { td.classList.add('check'); td.innerHTML = '<span class="lbl">V</span>'; }
                else if (mgSet.has(d)) td.classList.add('margin');
                else td.classList.add('wd');
                if (interv) { td.style.cursor = 'pointer'; td.addEventListener('click', (e) => { e.stopPropagation(); openInterventionDetails(interv); }); }
                row.appendChild(td);
            });
        });
        container.appendChild(table);
    }

    function stockFull() { let data = getData(STORAGE.pieces); return `<div class="card"><div class="card-header">Stock</div><div class="card-body"><table style="width:100%"><thead><th>Nom</th><th>Référence</th><th>Stock</th><th>Seuil</th><th>Actions</th></thead><tbody>${data.map(p=>`<tr><td>${p.nom}</td><td>${p.ref}</td><td>${p.stock}</td><td>${p.seuil}</td><td><button class="btn-sm" onclick="ajusterStock(${p.id})">📦</button><button class="btn-sm" onclick="editPiece(${p.id})">✏️</button><button class="btn-sm btn-secondary" onclick="deletePiece(${p.id})">🗑️</button></td>`).join('')}</tbody></table><button onclick="openPieceModal()">+ Pièce</button></div></div>`; }
    function achatsFull() { let data = getData(STORAGE.fournisseurs); return `<div class="card"><div class="card-header">Fournisseurs</div><div class="card-body"><table style="width:100%"><thead><th>Nom</th><th>Contact</th><th>Actions</th></thead><tbody>${data.map(f=>`<tr><td>${f.nom}</td><td>${f.contact||'-'}</td><td><button class="btn-sm" onclick="editFournisseur(${f.id})">✏️</button><button class="btn-sm btn-secondary" onclick="deleteFournisseur(${f.id})">🗑️</button></td>`).join('')}</tbody></table><button onclick="openFournisseurModal()">+ Fournisseur</button></div></div>`; }
    function gammesFull() { const storageKey = currentGammeType === 'op' ? STORAGE.gammesOp : STORAGE.gammesMaint; const gammes = getData(storageKey); const machinesUniques = getData(STORAGE.equipements).map(e=>e.nom); let html = `<div class="card"><div class="card-header">Gammes ${currentGammeType === 'op' ? 'Opérateurs' : 'Maintenance'}</div><div class="card-body"><div class="gamme-switch"><button id="switchToOp" class="btn-sm ${currentGammeType === 'op' ? '' : 'btn-secondary'}">👤 Gamme Opérateur</button><button id="switchToMaint" class="btn-sm ${currentGammeType === 'maint' ? '' : 'btn-secondary'}">🔧 Gamme Maintenance</button></div>${machinesUniques.map(m => { const etapes = gammes[m] || []; return `<div class="machine-gamme"><strong>${m}</strong> : ${etapes.length} étapes<ul>${etapes.map(e=>`<li>${e}</li>`).join('')}</ul><button class="btn-sm" onclick="editGammePrompt('${m}')">✏️ Modifier</button></div>`; }).join('')}</div></div>`; return html; }
    function renderGestionUtilisateurs() {
        let users = getData(STORAGE.users);
        if (!users.length) users = [{ id: "admin", name: "Administrateur", role: "admin" }];
        let html = `<div class="card"><div class="card-header">👥 Gestion des utilisateurs (simplifiée)</div><div class="card-body"><p>Cette version ne gère pas l'authentification. Vous pouvez ajouter des utilisateurs pour information.</p><button id="btnAddUser">+ Ajouter un utilisateur</button><table style="margin-top:16px; width:100%"><thead><th>Nom</th><th>Identifiant</th><th>Rôle</th><th>Actions</th></thead><tbody>${users.map(u => `<tr><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.id)}</td><td>${u.role}</td><td><button class="btn-sm btn-secondary" onclick="deleteUser('${u.id}')">🗑️ Supprimer</button></td>`).join('')}</tbody></table></div></div>`;
        document.getElementById("maintTabContent").innerHTML = html;
        document.getElementById("btnAddUser")?.addEventListener("click", () => { let name = prompt("Nom complet"); if(name){ let id = prompt("Identifiant (login)"); if(id){ let role = prompt("Rôle (admin, user)", "user"); let users = getData(STORAGE.users); users.push({ id, name, role }); setData(STORAGE.users, users); renderGestionUtilisateurs(); } } });
        window.deleteUser = (id) => { let users = getData(STORAGE.users).filter(u => u.id !== id); setData(STORAGE.users, users); renderGestionUtilisateurs(); };
    }
    function renderConsommables() {
        const machines = getData(STORAGE.equipements).map(e => e.nom);
        const consos = getConsommables();
        let formHtml = `<div class="card"><div class="card-header">➕ Ajouter un suivi consommable</div><div class="card-body"><div class="form-row"><div><label>Machine :</label><select id="consoMachine">${machines.map(m => `<option value="${m}">${m}</option>`).join('')}</select></div><div><label>Nom pièce :</label><input id="consoNom" placeholder="Ex: Filtre hydraulique"></div><div><label>Référence :</label><input id="consoRef" placeholder="Ex: FH-2100"></div><div><label>Durée (jours) :</label><input id="consoDuree" type="number" min="1" value="30"></div></div><button id="btnAjouterConsommable">📌 Ajouter le suivi</button></div></div>`;
        let listeHtml = `<div class="card"><div class="card-header">📋 Liste des suivis consommables</div><div class="card-body">`;
        if (consos.length === 0) listeHtml += `<div class="empty-state">Aucun consommable enregistré.</div>`;
        else {
            listeHtml += `<table style="width:100%"><thead><th>Machine</th><th>Pièce</th><th>Référence</th><th>Début</th><th>Alerte commande</th><th>Alerte installation</th><th>Actions</th></thead><tbody>`;
            consos.forEach(c => {
                const dateCmd = new Date(c.dateAlerteCommande).toLocaleDateString('fr-FR');
                const dateInst = new Date(c.dateAlerteInstall).toLocaleDateString('fr-FR');
                listeHtml += `<tr><td>${c.machine}</td><td>${c.nomPiece}</td><td>${c.reference}</td><td>${new Date(c.dateDebut).toLocaleDateString('fr-FR')}</td><td>${dateCmd} ${c.alerteCommandeEnvoyee ? '✔️' : '⏳'}</td><td>${dateInst} ${c.alerteInstallEnvoyee ? '✔️' : '⏳'}</td><td><button class="btn-sm btn-secondary" onclick="supprimerConsommable(${c.id})">🗑️ Supprimer</button></td>`);
            });
            listeHtml += `</tbody></table>`;
        }
        listeHtml += `</div></div>`;
        let calendrierHtml = `<div class="card"><div class="card-header">📅 Mini‑calendrier des alertes</div><div class="card-body"><div class="calendrier-mini">`;
        if (consos.length === 0) calendrierHtml += `<div class="empty-state">Aucune alerte à afficher.</div>`;
        else {
            const today = new Date();
            consos.forEach(c => {
                const dateCmd = new Date(c.dateAlerteCommande);
                const dateInst = new Date(c.dateAlerteInstall);
                let classe = "";
                if (dateCmd <= today) classe = "alert-commande";
                else if (dateInst <= today) classe = "alert-install";
                calendrierHtml += `<div class="consom-card ${classe}"><h4>🔩 ${c.nomPiece} (${c.reference})</h4><div><strong>Machine :</strong> ${c.machine}</div><div class="date-alerte">📆 Commande : ${dateCmd.toLocaleDateString('fr-FR')}</div><div class="date-alerte">🔧 Installation : ${dateInst.toLocaleDateString('fr-FR')}</div><div>📅 Début compteur : ${new Date(c.dateDebut).toLocaleDateString('fr-FR')}</div></div>`;
            });
        }
        calendrierHtml += `</div></div></div>`;
        document.getElementById("maintTabContent").innerHTML = formHtml + listeHtml + calendrierHtml;
        document.getElementById("btnAjouterConsommable")?.addEventListener("click", () => {
            const machine = document.getElementById("consoMachine").value;
            const nom = document.getElementById("consoNom").value.trim();
            const ref = document.getElementById("consoRef").value.trim();
            const duree = parseInt(document.getElementById("consoDuree").value);
            if (!machine || !nom || !ref || isNaN(duree) || duree < 1) { alert("Veuillez remplir tous les champs correctement."); return; }
            ajouterConsommable(machine, nom, ref, duree);
            renderConsommables();
        });
    }
    function renderHistoriquePannes(container) {
        let historique = getHistorique();
        let filterText = '';
        const render = () => {
            const searchTerm = filterText.toLowerCase();
            const filtered = historique.filter(h => h.machine.toLowerCase().includes(searchTerm) || h.piece.toLowerCase().includes(searchTerm) || h.description.toLowerCase().includes(searchTerm));
            container.innerHTML = `
                <div class="card"><div class="card-header">📸 Ajouter une panne à l'historique (photo + pièce)</div><div class="card-body"><div class="form-row"><div><label>Machine :</label><select id="histMachine">${getData(STORAGE.equipements).map(e=>`<option value="${e.nom}">${e.nom}</option>`).join('')}</select></div><div><label>Nom de la pièce (mot-clé) :</label><input type="text" id="histPiece" placeholder="ex: Courroie, Moteur..."></div></div><label>Description détaillée :</label><textarea id="histDescription" rows="2" placeholder="Cause, remède, remarques..."></textarea><label>Photo (appareil ou galerie) :</label><input type="file" id="histPhoto" accept="image/*" capture="environment"><div id="photoPreview"></div><button id="btnSaveHistorique">📌 Ajouter à l'historique</button></div></div>
                <div class="card"><div class="card-header">🔍 Recherche (pièce, machine, description)</div><div class="card-body"><input type="text" id="searchHistorique" placeholder="🔎 Ex: Courroie, Biesse..." class="search-bar"></div></div>
                <div class="card"><div class="card-header" id="historiqueCountHeader">📜 Historique des pannes (${filtered.length} entrées)</div><div class="card-body"><div class="historique-grid">${filtered.length === 0 ? '<div class="empty-state">Aucune panne historique trouvée.</div>' : filtered.map(pan => `<div class="panne-card">${pan.imageBase64 ? `<img src="${pan.imageBase64}" class="panne-image">` : '<div class="panne-image" style="background:#eef2f5; display:flex; align-items:center; justify-content:center;">📷</div>'}<div class="panne-infos"><strong>🖥️ ${escapeHtml(pan.machine)}</strong> &nbsp;| 🔧 Pièce: <strong>${escapeHtml(pan.piece)}</strong><br>📅 ${new Date(pan.date).toLocaleString('fr-FR')}<br><strong>Description :</strong><br> ${escapeHtml(pan.description)}<br><button class="btn-sm btn-secondary" onclick="supprimerHistorique(${pan.id})">🗑️ Supprimer</button></div></div>`).join('')}</div></div></div>
            `;
            document.getElementById("searchHistorique")?.addEventListener("input", (e) => { filterText = e.target.value; render(); });
            document.getElementById("btnSaveHistorique")?.addEventListener("click", async () => {
                const machine = document.getElementById("histMachine").value;
                const piece = document.getElementById("histPiece").value.trim();
                const description = document.getElementById("histDescription").value.trim();
                if (!machine || !piece || !description) { alert("Veuillez remplir machine, pièce et description."); return; }
                const fileInput = document.getElementById("histPhoto");
                let imageBase64 = null;
                if (fileInput.files && fileInput.files[0]) {
                    imageBase64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(fileInput.files[0]);
                    });
                }
                addHistorique(machine, piece, description, imageBase64);
                historique = getHistorique();
                document.getElementById("histPiece").value = "";
                document.getElementById("histDescription").value = "";
                document.getElementById("histPhoto").value = "";
                document.getElementById("photoPreview").innerHTML = "";
                render();
            });
            document.getElementById("histPhoto")?.addEventListener("change", (e) => {
                const preview = document.getElementById("photoPreview");
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { preview.innerHTML = `<img src="${ev.target.result}" class="photo-preview" style="max-width:100px;">`; };
                    reader.readAsDataURL(e.target.files[0]);
                } else preview.innerHTML = "";
            });
        };
        render();
        window.supprimerHistorique = (id) => { if(confirm("Supprimer cette entrée ?")) { deleteHistorique(id); historique = getHistorique(); render(); } };
    }
    
    function refreshMaintenanceViews() {
        if (currentMaintTab === 'preventif') { if (document.getElementById("ganttContainer")) buildGanttTableWithCustom(); if (document.getElementById("legendContainer")) buildLegendStatic(); const container = document.getElementById("allInterventionsContainer"); if (container && container.innerHTML !== "") renderAllInterventionsListInContainer(container); }
        if (currentMaintTab === 'dashboard') renderDashboardMaintenance();
        if (currentMaintTab === 'consommables') renderConsommables();
        if (currentMaintTab === 'historique') { const container = document.getElementById("maintTabContent"); if(container) renderHistoriquePannes(container); }
        if (currentMaintTab === 'equipements') renderEquipements();
        if (currentMaintTab === 'stock') document.getElementById("maintTabContent").innerHTML = stockFull();
        if (currentMaintTab === 'achats') document.getElementById("maintTabContent").innerHTML = achatsFull();
        if (currentMaintTab === 'gammes') document.getElementById("maintTabContent").innerHTML = gammesFull();
        if (currentMaintTab === 'users') renderGestionUtilisateurs();
    }
    
    function renderMaintenance() {
        let html = `<div style="display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;"><button class="reset-btn" onclick="resetGamme('op')">🔄 Réinit. gamme opérateur</button><button class="reset-btn" onclick="resetGamme('maint')">🔄 Réinit. gamme maintenance</button><button class="reset-btn" onclick="resetStock()">🔄 Réinit. stock</button></div><div class="tabs" id="maintTabs"><button class="tab-btn" data-tab="dashboard">📊 Dashboard</button><button class="tab-btn" data-tab="equipements">🖥️ Équipements</button><button class="tab-btn" data-tab="preventif">📅 Planning Gantt & Interventions</button><button class="tab-btn" data-tab="stock">📦 Stock</button><button class="tab-btn" data-tab="achats">🛒 Achats</button><button class="tab-btn" data-tab="gammes">📋 Gammes</button><button class="tab-btn" data-tab="users">👥 Gestion utilisateurs</button><button class="tab-btn" data-tab="consommables">⏳ Consommables</button><button class="tab-btn" data-tab="historique">📸 Historique Pannes</button></div><div id="maintTabContent"></div>`;
        document.getElementById("tabContents").innerHTML = html;
        function loadTab(tabId) {
            currentMaintTab = tabId;
            if(tabId === "dashboard") renderDashboardMaintenance();
            else if(tabId === "equipements") renderEquipements();
            else if(tabId === "preventif") renderPlanningGanttWithCustom();
            else if(tabId === "stock") document.getElementById("maintTabContent").innerHTML = stockFull();
            else if(tabId === "achats") document.getElementById("maintTabContent").innerHTML = achatsFull();
            else if(tabId === "gammes") document.getElementById("maintTabContent").innerHTML = gammesFull();
            else if(tabId === "users") renderGestionUtilisateurs();
            else if(tabId === "consommables") renderConsommables();
            else if(tabId === "historique") renderHistoriquePannes(document.getElementById("maintTabContent"));
        }
        const btns = document.querySelectorAll("#maintTabs .tab-btn");
        btns.forEach(btn => {
            btn.addEventListener("click", () => { btns.forEach(b => b.classList.remove("active")); btn.classList.add("active"); loadTab(btn.getAttribute("data-tab")); if(btn.getAttribute("data-tab") === "gammes") setTimeout(()=>attachGammeEvents(), 20); });
            if(btn.getAttribute("data-tab") === currentMaintTab) btn.classList.add("active");
        });
        loadTab(currentMaintTab);
        if(currentMaintTab === "gammes") setTimeout(attachGammeEvents, 50);
        function attachGammeEvents() {
            const switchOp = document.getElementById("switchToOp");
            const switchMaint = document.getElementById("switchToMaint");
            if(switchOp) switchOp.addEventListener("click",()=>{ currentGammeType="op"; renderMaintenance(); });
            if(switchMaint) switchMaint.addEventListener("click",()=>{ currentGammeType="maint"; renderMaintenance(); });
        }
    }
    
    // ==================== FONCTIONS GLOBALES ====================
    window.resoudrePanneMaintenance = (id) => {
        let pannes = getData(STORAGE.pannes);
        let panne = pannes.find(p => p.id === id);
        if(panne && panne.statut !== "Résolu") {
            panne.statut = "Résolu"; panne.dateResolution = new Date().toISOString();
            setData(STORAGE.pannes, pannes);
            const autresPannes = pannes.filter(p => p.equipementId === panne.equipementId && p.statut !== "Résolu" && p.id !== id);
            if (autresPannes.length === 0) { let eq = getData(STORAGE.equipements).map(e => e.id === panne.equipementId ? { ...e, statut: "En fonctionnement" } : e); setData(STORAGE.equipements, eq); }
            if (!getData(STORAGE.pannes).some(p => p.statut !== "Résolu")) setData(STORAGE.alertePanneIgnored, false);
            alert("Panne résolue."); renderMaintenance();
        } else alert("Déjà résolue.");
    };
    window.editGammePrompt = (machine) => {
        const storageKey = currentGammeType === 'op' ? STORAGE.gammesOp : STORAGE.gammesMaint;
        let gammes = getData(storageKey);
        let current = gammes[machine] || [];
        let newEtapes = prompt("Modifier les étapes (séparées par des virgules) :", current.join(", "));
        if (newEtapes !== null) { gammes[machine] = newEtapes.split(",").map(s=>s.trim()).filter(s=>s); setData(storageKey, gammes); renderMaintenance(); }
    };
    window.ajusterStock = (id) => { let pieces = getData(STORAGE.pieces); let p = pieces.find(p=>p.id===id); if(p){ let q = prompt("Nouveau stock", p.stock); if(q!==null){ p.stock = parseInt(q); setData(STORAGE.pieces, pieces); renderMaintenance(); } } };
    window.resetGamme = (type) => { const machine = prompt("Nom machine :"); if(machine && MACHINES_LIST.includes(machine)){ const key=type==='op'?STORAGE.gammesOp:STORAGE.gammesMaint; let g=getData(key); g[machine]=type==='op'?["Nettoyage général","Vérification visuelle","Test fonctionnement"]:["Inspection mécanique","Lubrification","Vérification électrique","Test final"]; setData(key,g); renderMaintenance(); } };
    window.resetStock = () => { if(confirm("Remettre stock par défaut ?")){ setData(STORAGE.pieces,[{ id:1, nom:"Courroie trapézoïdale", ref:"CT-100", stock:12, seuil:5, fournisseurPref:"Catana" }]); renderMaintenance(); } };
    window.openPieceModal = () => { showModal("Ajouter pièce", `<label>Nom:</label><input id="pieceNom"><label>Référence:</label><input id="pieceRef"><label>Stock:</label><input id="pieceStock" type="number"><label>Seuil:</label><input id="pieceSeuil" type="number"><label>Fournisseur:</label><input id="pieceFourn">`, () => { let pieces = getData(STORAGE.pieces); let newId = pieces.length?Math.max(...pieces.map(p=>p.id))+1:1; pieces.push({ id:newId, nom:document.getElementById("pieceNom").value, ref:document.getElementById("pieceRef").value, stock:parseInt(document.getElementById("pieceStock").value)||0, seuil:parseInt(document.getElementById("pieceSeuil").value)||0, fournisseurPref:document.getElementById("pieceFourn").value }); setData(STORAGE.pieces, pieces); renderMaintenance(); }); };
    window.editPiece = (id) => { let pieces = getData(STORAGE.pieces); let p = pieces.find(p=>p.id===id); if(p) showModal("Modifier pièce", `<label>Nom:</label><input id="pieceNom" value="${p.nom}"><label>Référence:</label><input id="pieceRef" value="${p.ref}"><label>Stock:</label><input id="pieceStock" type="number" value="${p.stock}"><label>Seuil:</label><input id="pieceSeuil" type="number" value="${p.seuil}"><label>Fournisseur:</label><input id="pieceFourn" value="${p.fournisseurPref}">`, () => { p.nom = document.getElementById("pieceNom").value; p.ref = document.getElementById("pieceRef").value; p.stock = parseInt(document.getElementById("pieceStock").value); p.seuil = parseInt(document.getElementById("pieceSeuil").value); p.fournisseurPref = document.getElementById("pieceFourn").value; setData(STORAGE.pieces, pieces); renderMaintenance(); }); };
    window.deletePiece = (id) => { if(confirm("Supprimer cette pièce ?")){ let list = getData(STORAGE.pieces).filter(p=>p.id!==id); setData(STORAGE.pieces, list); renderMaintenance(); } };
    window.openFournisseurModal = () => { showModal("Ajouter fournisseur", `<label>Nom:</label><input id="fournNom"><label>Contact:</label><input id="fournContact"><label>Tél:</label><input id="fournTel"><label>Email:</label><input id="fournEmail">`, () => { let fours = getData(STORAGE.fournisseurs); let newId = fours.length?Math.max(...fours.map(f=>f.id))+1:1; fours.push({ id:newId, nom:document.getElementById("fournNom").value, contact:document.getElementById("fournContact").value, tel:document.getElementById("fournTel").value, email:document.getElementById("fournEmail").value }); setData(STORAGE.fournisseurs, fours); renderMaintenance(); }); };
    window.editFournisseur = (id) => { let fours = getData(STORAGE.fournisseurs); let f = fours.find(f=>f.id===id); if(f) showModal("Modifier fournisseur", `<label>Nom:</label><input id="fournNom" value="${f.nom}"><label>Contact:</label><input id="fournContact" value="${f.contact||''}"><label>Tél:</label><input id="fournTel" value="${f.tel||''}"><label>Email:</label><input id="fournEmail" value="${f.email||''}">`, () => { f.nom = document.getElementById("fournNom").value; f.contact = document.getElementById("fournContact").value; f.tel = document.getElementById("fournTel").value; f.email = document.getElementById("fournEmail").value; setData(STORAGE.fournisseurs, fours); renderMaintenance(); }); };
    window.deleteFournisseur = (id) => { if(confirm("Supprimer ce fournisseur ?")){ let list = getData(STORAGE.fournisseurs).filter(f=>f.id!==id); setData(STORAGE.fournisseurs, list); renderMaintenance(); } };
    window.supprimerConsommable = (id) => { if (confirm("Supprimer ce suivi consommable ?")) { supprimerConsommable(id); if (currentMaintTab === 'consommables') renderConsommables(); } };
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    // Lancement
    renderMaintenance();
    document.getElementById("modalSaveInterventionBtn")?.addEventListener("click", saveCurrentInterventionDetails);
</script>
</body>
</html>
